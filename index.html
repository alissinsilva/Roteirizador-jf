<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roteirizador Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<style>

:root{
--bg:#121212;
--card:#1e1e1e;
--azul:#4285F4;
--verde:#34A853;
--borda:#383838;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:white;
font-family:Arial,sans-serif;
overflow:hidden;
}

#mapa{
position:absolute;
top:0;
left:0;
width:100%;
height:55%;
z-index:1;
}

.leaflet-routing-container{
display:none !important;
}

.painel{
position:absolute;
bottom:0;
left:0;
right:0;
height:45%;
background:#121212;
padding:15px;
z-index:1000;
overflow:auto;
}

.barra{
display:flex;
gap:10px;
margin-bottom:10px;
}

.barra input{
flex:1;
padding:12px;
background:#1e1e1e;
border:1px solid #333;
border-radius:10px;
color:white;
}

.btn-add{
width:50px;
background:var(--azul);
border:none;
color:white;
border-radius:10px;
font-size:22px;
cursor:pointer;
}

.lista{
max-height:180px;
overflow:auto;
margin-top:10px;
}

.item{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-bottom:1px solid #333;
}

.numero{
width:28px;
height:28px;
border-radius:50%;
background:var(--azul);
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

.numero.atual{
background:var(--verde);
}

.botoes{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.azul{
background:var(--azul);
color:white;
}

.verde{
background:var(--verde);
color:white;
}

.cinza{
background:#222;
color:white;
}

.resumo{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div id="mapa"></div>

<div class="painel">

<div class="barra">

<input
id="inputEndereco"
placeholder="Digite o endereço completo">

<button
class="btn-add"
onclick="adicionarParada()">
+
</button>

</div>

<div
class="resumo"
id="resumoRota">

0h00min • 0 paradas • 0 km

</div>

<div
class="lista"
id="listaParadas">

Nenhuma entrega pendente

</div>

<div class="botoes">

<button
class="azul"
onclick="calcularMelhorRota()">

Otimizar Rota

</button>

<button
class="cinza"
onclick="navegarNoGoogleMaps()">

Navegar

</button>

</div>

<div class="botoes">

<button
class="verde"
onclick="entregue()">

✅ Entregue / Próxima

</button>

<button
class="azul"
onclick="limparTudo()">

🗑 Limpar

</button>

</div>

</div>
<script>

let mapa;
let controleRota;

let minhaLat = -21.7595;
let minhaLng = -43.3424;

let paradas = [];


// ==========================
// INICIAR GPS
// ==========================

window.onload = () => {

    if(navigator.geolocation){

        navigator.geolocation.getCurrentPosition(

            pos => {

                minhaLat = pos.coords.latitude;
                minhaLng = pos.coords.longitude;

                iniciarMapa();

            },

            erro => {

                console.log(erro);

                iniciarMapa();

            },

            {
                enableHighAccuracy:true,
                timeout:10000
            }

        );

    }else{

        iniciarMapa();

    }

};


// ==========================
// MAPA
// ==========================

function iniciarMapa(){

    mapa = L.map("mapa").setView(
        [minhaLat,minhaLng],
        14
    );

    L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            attribution:"© OpenStreetMap"
        }
    ).addTo(mapa);

    L.marker(
        [minhaLat,minhaLng]
    )
    .addTo(mapa)
    .bindPopup("Minha localização");

}


// ==========================
// GEOCODIFICAR ENDEREÇO
// ==========================

async function geocodificarEndereco(endereco){

    try{

        const resposta = await fetch(

            `https://nominatim.openstreetmap.org/search?format=json&countrycodes=br&addressdetails=1&limit=1&q=${encodeURIComponent(endereco)}`

        );

        const dados = await resposta.json();

        if(!dados.length){

            return null;

        }

        return {

            lat: parseFloat(dados[0].lat),

            lng: parseFloat(dados[0].lon),

            endereco:
            dados[0].display_name

        };

    }

    catch(erro){

        console.error(erro);

        return null;

    }

}


// ==========================
// ADICIONAR PARADA
// ==========================

async function adicionarParada(){

    const campo =
    document.getElementById(
        "inputEndereco"
    );

    const endereco =
    campo.value.trim();

    if(!endereco){

        alert(
            "Digite um endereço."
        );

        return;

    }

    campo.value = "";

    const local =
    await geocodificarEndereco(
        endereco
    );

    if(!local){

        alert(
            "Endereço não encontrado."
        );

        return;

    }

    paradas.push({

        endereco: local.endereco,

        lat: local.lat,

        lng: local.lng

    });

    atualizarListaParadas();

}


// ==========================
// LISTA
// ==========================

function atualizarListaParadas(){

    const lista =
    document.getElementById(
        "listaParadas"
    );

    if(paradas.length === 0){

        lista.innerHTML =
        "Nenhuma entrega pendente";

        return;

    }

    lista.innerHTML = "";

    paradas.forEach(

        (p,index)=>{

            lista.innerHTML += `

            <div class="item">

                <div class="numero">

                    ${index+1}

                </div>

                <div>

                    ${p.endereco}

                </div>

            </div>

            `;

        }

    );

}


// ==========================
// LIMPAR TUDO
// ==========================

function limparTudo(){

    if(
        !confirm(
            "Apagar todas as entregas?"
        )
    ){
        return;
    }

    paradas = [];

    atualizarListaParadas();

    document.getElementById(
        "resumoRota"
    ).innerHTML =
    "0h00min • 0 paradas • 0 km";

    if(controleRota){

        mapa.removeControl(
            controleRota
        );

        controleRota = null;

    }

}
//
// ==========================
// CALCULAR ROTA OTIMIZADA
// USANDO OSRM TRIP API
// ==========================
//

async function calcularMelhorRota(){

    if(paradas.length === 0){

        alert("Adicione pelo menos uma parada.");

        return;

    }

    try{

        let coordenadas =
        `${minhaLng},${minhaLat}`;

        paradas.forEach(p => {

            coordenadas +=
            `;${p.lng},${p.lat}`;

        });

        const resposta =
        await fetch(

        `https://router.project-osrm.org/trip/v1/driving/${coordenadas}?source=first&roundtrip=false&steps=true&geometries=geojson`

        );

        const dados =
        await resposta.json();

        if(!dados.waypoints){

            throw new Error(
                "Erro OSRM"
            );

        }

        //
        // REORDENA AS ENTREGAS
        //

        let novaRota = [];

        dados.waypoints

        .sort(
            (a,b)=>
            a.waypoint_index -
            b.waypoint_index
        )

        .forEach(w => {

            if(
                w.waypoint_index > 0
            ){

                novaRota.push(

                    paradas[
                        w.waypoint_index - 1
                    ]

                );

            }

        });

        paradas = novaRota;

        atualizarListaParadas();

        //
        // REMOVE ROTA ANTIGA
        //

        if(controleRota){

            mapa.removeControl(
                controleRota
            );

        }

        //
        // DESENHA NOVA ROTA
        //

        let waypoints = [

            L.latLng(
                minhaLat,
                minhaLng
            )

        ];

        paradas.forEach(p => {

            waypoints.push(

                L.latLng(
                    p.lat,
                    p.lng
                )

            );

        });

        controleRota =
        L.Routing.control({

            waypoints,

            addWaypoints:false,

            draggableWaypoints:false,

            routeWhileDragging:false,

            show:false,

            fitSelectedRoutes:true,

            createMarker:
            function(i,wp){

                if(i===0){

                    return L.marker(
                        wp.latLng
                    ).bindPopup(
                        "Minha localização"
                    );

                }

                return L.marker(
                    wp.latLng
                ).bindPopup(

                    `Parada ${i}`

                );

            }

        }).addTo(mapa);

        //
        // RESUMO
        //

        controleRota.on(
            "routesfound",

            function(e){

                const resumo =
                e.routes[0].summary;

                const km =
                (
                    resumo.totalDistance
                    /1000
                ).toFixed(1);

                const tempo =
                Math.round(
                    resumo.totalTime
                    /60
                );

                document
                .getElementById(
                    "resumoRota"
                )
                .innerHTML =

                `${Math.floor(
                    tempo/60
                )}h${tempo%60}min • ${paradas.length} paradas • ${km} km`;

            }

        );

    }

    catch(erro){

        console.error(
            erro
        );

        alert(
            "Erro ao calcular rota."
        );

    }

}



//
// ==========================
// GOOGLE MAPS
// ==========================
//

function navegarNoGoogleMaps(){

    if(
        paradas.length === 0
    ){

        alert(
            "Nenhuma entrega pendente."
        );

        return;

    }

    const destino =
    paradas[0];

    const url =

    `https://www.google.com/maps/dir/?api=1&origin=${minhaLat},${minhaLng}&destination=${destino.lat},${destino.lng}&travelmode=driving`;

    window.open(
        url,
        "_blank"
    );

}



//
// ==========================
// ENTREGUE / PRÓXIMA
// ==========================
//

function entregue(){

    if(
        paradas.length === 0
    ){

        alert(
            "Nenhuma entrega."
        );

        return;

    }

    //
    // REMOVE ENTREGA
    // CONCLUÍDA
    //

    paradas.shift();

    atualizarListaParadas();

    //
    // TEM MAIS ENTREGAS?
    //

    if(
        paradas.length > 0
    ){

        calcularMelhorRota();

    }

    else{

        document
        .getElementById(
            "resumoRota"
        )
        .innerHTML =
        "0h00min • 0 paradas • 0 km";

        if(controleRota){

            mapa.removeControl(
                controleRota
            );

            controleRota = null;

        }

        alert(
            "Todas as entregas foram concluídas."
        );

    }

}

</script>

</body>
</html>
