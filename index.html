<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mover Express Pro</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f6f9;
}

.container{
max-width:1200px;
margin:auto;
padding:15px;
}

.header{
background:#1e40af;
color:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.header h1{
font-size:26px;
}

.grid{
display:grid;
grid-template-columns:350px 1fr;
gap:15px;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:15px;
}

input,
button,
select{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
cursor:pointer;
border:none;
font-weight:bold;
}

.btn-primary{
background:#2563eb;
color:white;
}

.btn-success{
background:#16a34a;
color:white;
}

.btn-danger{
background:#dc2626;
color:white;
}

.btn-dark{
background:#334155;
color:white;
}

#map{
height:600px;
border-radius:10px;
}

.lista{
list-style:none;
}

.lista li{
padding:10px;
margin-bottom:6px;
background:#f8fafc;
border-radius:8px;
border:1px solid #e2e8f0;
}

.badge{
padding:4px 8px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.pendente{
background:#fef3c7;
}

.entregue{
background:#dcfce7;
}

.atual{
background:#bfdbfe;
}

.status{
font-size:14px;
margin-top:8px;
color:#64748b;
}

#reader{
display:none;
margin-top:10px;
}

.relatorio{
background:#f0fdf4;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>🚚 Mover Express Pro</h1>
<p>Roteirização Inteligente por Menor KM Real</p>
</div>

<div class="grid">

<div>

<div class="card">

<h3>Localização Atual</h3>

<button
class="btn-primary"
onclick="obterGPS()">
📍 Capturar GPS
</button>

<p id="gpsStatus"
class="status">
GPS não capturado
</p>

</div>

<div class="card">

<h3>Adicionar Entrega</h3>

<input
id="endereco"
placeholder="Rua, Número, Cidade">

<button
class="btn-success"
onclick="adicionarEndereco()">
➕ Adicionar
</button>

</div>

<div class="card">

<h3>Importar CSV</h3>

<input
type="file"
id="csvFile"
accept=".csv">

<button
class="btn-dark"
onclick="importarCSV()">
📄 Importar
</button>

</div>

<div class="card">

<h3>Scanner QRCode</h3>

<button
class="btn-primary"
onclick="abrirScanner()">
📷 Abrir Scanner
</button>

<div id="reader"></div>

</div>

<div class="card">

<h3>Otimização</h3>

<button
class="btn-success"
onclick="calcularRota()">
🚀 Calcular Melhor Rota
</button>

</div>

<div class="card">

<h3>Próxima Entrega</h3>

<div id="proximaEntrega">
Nenhuma rota calculada
</div>

<button
class="btn-primary"
onclick="concluirEntrega()">
✅ Concluir Entrega
</button>

</div>

<div class="card">

<h3>Lista de Entregas</h3>

<ul id="listaEntregas"
class="lista"></ul>

</div>

<div class="card">

<h3>Relatório</h3>

<div
id="relatorio"
class="relatorio">

Total KM: 0

</div>

</div>

</div>

<div>

<div id="map"></div>

</div>

</div>

</div>
  <script>

let mapa;
let marcadorGPS;

let localizacaoAtual = null;

let pontosEntrega = [];

let rotaOtimizada = [];

let indiceAtual = 0;

let scanner = null;

mapa = L.map('map').setView([-21.7642,-43.3503],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(mapa);

const grupoMarcadores = L.layerGroup().addTo(mapa);

function obterGPS(){

if(!navigator.geolocation){

alert("GPS não suportado");

return;

}

navigator.geolocation.getCurrentPosition(

(pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

localizacaoAtual = {
nome:"Minha Localização",
lat,
lng
};

document.getElementById("gpsStatus").innerHTML =
`GPS Capturado<br>
Lat: ${lat.toFixed(6)}<br>
Lng: ${lng.toFixed(6)}`;

if(marcadorGPS){

mapa.removeLayer(marcadorGPS);

}

marcadorGPS = L.marker([lat,lng])
.addTo(mapa)
.bindPopup("Você está aqui");

mapa.setView([lat,lng],15);

},

(err)=>{

alert("Não foi possível obter localização.");

}

);

}

async function buscarCoordenadas(endereco){

try{

const url =
`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}&limit=1`;

const resposta = await fetch(url);

const dados = await resposta.json();

if(dados.length===0){

return null;

}

return{

nome:endereco,

lat:parseFloat(dados[0].lat),

lng:parseFloat(dados[0].lon)

};

}
catch(e){

console.log(e);

return null;

}

}

async function adicionarEndereco(){

const campo =
document.getElementById("endereco");

const endereco =
campo.value.trim();

if(!endereco){

alert("Digite um endereço.");

return;

}

campo.disabled = true;

campo.value = "Localizando...";

const ponto =
await buscarCoordenadas(endereco);

campo.disabled = false;

campo.value = "";

if(!ponto){

alert("Endereço não encontrado.");

return;

}

pontosEntrega.push(ponto);

const marcador = L.marker([
ponto.lat,
ponto.lng
]);

marcador
.bindPopup(ponto.nome)
.addTo(grupoMarcadores);

renderizarLista();

ajustarMapa();

}

function ajustarMapa(){

const bounds = [];

if(localizacaoAtual){

bounds.push([
localizacaoAtual.lat,
localizacaoAtual.lng
]);

}

pontosEntrega.forEach(p=>{

bounds.push([
p.lat,
p.lng
]);

});

if(bounds.length>0){

mapa.fitBounds(bounds,{
padding:[50,50]
});

}

}

function renderizarLista(){

const lista =
document.getElementById(
"listaEntregas"
);

lista.innerHTML = "";

pontosEntrega.forEach((item,index)=>{

lista.innerHTML += `
<li>
📦 ${item.nome}
</li>
`;

});

}

function abrirScanner(){

const reader =
document.getElementById("reader");

reader.style.display="block";

if(scanner){

return;

}

scanner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
);

scanner.render(

async(texto)=>{

scanner.clear();

reader.style.display="none";

const ponto =
await buscarCoordenadas(texto);

if(!ponto){

alert(
"QR não contém endereço válido."
);

return;

}

pontosEntrega.push(ponto);

L.marker([
ponto.lat,
ponto.lng
])
.bindPopup(ponto.nome)
.addTo(grupoMarcadores);

renderizarLista();

ajustarMapa();

},

(error)=>{}

);

}

function abrirGoogleMaps(lat,lng){

window.open(
`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`,
'_blank'
);

}

function abrirWaze(lat,lng){

window.open(
`https://waze.com/ul?ll=${lat},${lng}&navigate=yes`,
'_blank'
);

}

</script>
  <script>

let linhaRota = null;
let kmTotal = 0;

async function calcularRota(){

    if(!localizacaoAtual){
        alert("Capture o GPS primeiro.");
        return;
    }

    if(pontosEntrega.length < 1){
        alert("Adicione pelo menos uma entrega.");
        return;
    }

    try{

        const todosPontos = [
            localizacaoAtual,
            ...pontosEntrega
        ];

        const coordenadas = todosPontos
            .map(p => `${p.lng},${p.lat}`)
            .join(";");

        const url =
        `https://router.project-osrm.org/trip/v1/driving/${coordenadas}?source=first&roundtrip=false&overview=full&geometries=geojson&steps=false`;

        const resposta = await fetch(url);
        const dados = await resposta.json();

        if(dados.code !== "Ok"){
            throw new Error("Erro OSRM");
        }

        rotaOtimizada = [];

        dados.waypoints
        .sort(
            (a,b)=>
            a.waypoint_index-b.waypoint_index
        )
        .forEach(wp=>{

            rotaOtimizada.push(
                todosPontos[wp.trips_index]
            );

        });

        kmTotal =
        dados.trips[0].distance / 1000;

        desenharRota(
            dados.trips[0].geometry
        );

        indiceAtual = 1;

        atualizarProximaEntrega();

        document.getElementById(
        "relatorio"
        ).innerHTML =
        `
        Total KM: ${kmTotal.toFixed(2)}
        <br>
        Entregas: ${pontosEntrega.length}
        `;

        renderizarListaOtimizada();

    }
    catch(e){

        console.log(e);

        alert(
        "Erro ao otimizar rota."
        );

    }

}

function desenharRota(geojson){

    if(linhaRota){

        mapa.removeLayer(linhaRota);

    }

    linhaRota = L.geoJSON(
        geojson,
        {
            style:{
                color:"#2563eb",
                weight:5
            }
        }
    ).addTo(mapa);

    mapa.fitBounds(
        linhaRota.getBounds()
    );

}

function renderizarListaOtimizada(){

    const lista =
    document.getElementById(
    "listaEntregas"
    );

    lista.innerHTML="";

    rotaOtimizada.forEach(
    (ponto,index)=>{

        let classe = "";

        if(index < indiceAtual){

            classe = "entregue";

        }
        else if(index === indiceAtual){

            classe = "atual";

        }
        else{

            classe = "pendente";

        }

        if(index === 0){

            return;

        }

        lista.innerHTML +=
        `
        <li class="${classe}">

            📦 ${index}
            - ${ponto.nome}

            <br><br>

            <button
            onclick="
            abrirGoogleMaps(
            ${ponto.lat},
            ${ponto.lng}
            )">

            Google Maps

            </button>

            <button
            onclick="
            abrirWaze(
            ${ponto.lat},
            ${ponto.lng}
            )">

            Waze

            </button>

        </li>
        `;

    });

}

function atualizarProximaEntrega(){

    const div =
    document.getElementById(
    "proximaEntrega"
    );

    if(
    indiceAtual >=
    rotaOtimizada.length
    ){

        div.innerHTML =
        `
        <h3>
        🎉 Todas as entregas concluídas
        </h3>
        `;

        return;

    }

    const parada =
    rotaOtimizada[
    indiceAtual
    ];

    div.innerHTML =
    `
    <strong>
    ${parada.nome}
    </strong>

    <br><br>

    <button
    onclick="
    abrirGoogleMaps(
    ${parada.lat},
    ${parada.lng}
    )">

    Navegar

    </button>
    `;

}

function concluirEntrega(){

    if(
    indiceAtual >=
    rotaOtimizada.length
    ){

        return;

    }

    indiceAtual++;

    atualizarProximaEntrega();

    renderizarListaOtimizada();

}

</script>
